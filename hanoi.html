<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>汉诺塔</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
    }
    h1 { margin-bottom: 8px; font-size: 1.4rem; letter-spacing: 2px; }
    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    #controls label { font-size: 0.9rem; }
    #diskCount {
      width: 60px;
      padding: 4px 8px;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
      text-align: center;
    }
    button {
      padding: 6px 18px;
      border-radius: 6px;
      border: none;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #c73652; }
    #status {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 18px;
      height: 1.2em;
    }
    #scene {
      display: flex;
      gap: 40px;
      align-items: flex-end;
    }
    .tower-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .tower-label {
      font-size: 0.8rem;
      color: #888;
      margin-top: 8px;
    }
    .count-badge {
      background: #16213e;
      border: 1px solid #444;
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #e94560;
      min-width: 48px;
      text-align: center;
    }
    .pole {
      width: 8px;
      background: #888;
      border-radius: 4px;
    }
    #speed { width: 100px; }
    #stepInfo {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #7ec8e3;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>汉诺塔</h1>

  <div id="controls">
    <label>圆盘数：</label>
    <input id="diskCount" type="number" min="1" max="12" value="4">
    <label>速度：</label>
    <input id="speed" type="range" min="50" max="1000" value="400">
    <button id="startBtn" onclick="startSolve()">开始</button>
    <button onclick="reset()">重置</button>
  </div>

  <div id="status">就绪</div>

  <div id="scene">
    <div class="tower-wrap">
      <div class="count-badge" id="countA">0</div>
      <div class="pole" id="poleA" style="height:160px"></div>
      <div class="tower-label">A</div>
    </div>
    <div class="tower-wrap">
      <div class="count-badge" id="countB">0</div>
      <div class="pole" id="poleB" style="height:160px"></div>
      <div class="tower-label">B</div>
    </div>
    <div class="tower-wrap">
      <div class="count-badge" id="countC">0</div>
      <div class="pole" id="poleC" style="height:160px"></div>
      <div class="tower-label">C</div>
    </div>
  </div>

  <div id="stepInfo"></div>

  <script>
    const towers = { A: [], B: [], C: [] };
    let moves = [];
    let timer = null;
    let stepIndex = 0;

    function updateUI() {
      document.getElementById('countA').textContent = towers.A.length;
      document.getElementById('countB').textContent = towers.B.length;
      document.getElementById('countC').textContent = towers.C.length;
    }

    function generateMoves(n, from, to, via, result) {
      if (n === 0) return;
      generateMoves(n - 1, from, via, to, result);
      result.push({ from, to, disk: n });
      generateMoves(n - 1, via, to, from, result);
    }

    function reset() {
      clearInterval(timer);
      timer = null;
      moves = [];
      stepIndex = 0;
      towers.A = [];
      towers.B = [];
      towers.C = [];
      const n = parseInt(document.getElementById('diskCount').value) || 4;
      for (let i = n; i >= 1; i--) towers.A.push(i);
      updateUI();
      document.getElementById('status').textContent = '就绪';
      document.getElementById('stepInfo').textContent = '';
      document.getElementById('startBtn').textContent = '开始';
    }

    function startSolve() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        document.getElementById('startBtn').textContent = '继续';
        document.getElementById('status').textContent = '已暂停';
        return;
      }

      if (stepIndex === 0) {
        const n = parseInt(document.getElementById('diskCount').value) || 4;
        towers.A = [];
        towers.B = [];
        towers.C = [];
        for (let i = n; i >= 1; i--) towers.A.push(i);
        moves = [];
        generateMoves(n, 'A', 'C', 'B', moves);
        updateUI();
      }

      document.getElementById('startBtn').textContent = '暂停';
      const delay = 1050 - parseInt(document.getElementById('speed').value);

      timer = setInterval(() => {
        if (stepIndex >= moves.length) {
          clearInterval(timer);
          timer = null;
          document.getElementById('status').textContent = `完成！共 ${moves.length} 步`;
          document.getElementById('startBtn').textContent = '开始';
          stepIndex = 0;
          return;
        }

        const move = moves[stepIndex];
        const disk = towers[move.from].pop();
        towers[move.to].push(disk);

        document.getElementById('status').textContent =
          `步骤 ${stepIndex + 1} / ${moves.length}`;
        document.getElementById('stepInfo').textContent =
          `移动圆盘 ${disk}：${move.from} → ${move.to}`;

        updateUI();
        stepIndex++;
      }, delay);
    }

    reset();
  </script>
</body>
</html>
